<div class="form-row">
    <label for="node-input-name">
        <i class="fa fa-tag"></i>
        <span data-i18n="node-red:common.label.name"></span>
    </label>
    <input type="text" id="node-input-name" data-i18n="[placeholder]node-red:common.label.name" style="width:70%;">
</div>
<div class="form-row">
    <label for="node-input-values">
        <i class="fa fa-sliders"></i>
        <span data-i18n="scene-controller.label.values"></span>
    </label>
    <select id="node-input-values" style="width:70%;">
        <option value="percent" selected data-i18n="scene-controller.label.values_percent"></option>
        <option value="absolute" data-i18n="scene-controller.label.values_absolute"></option>
    </select>
</div>
<div class="form-row">
    <label for="node-input-playMode">
        <i class="fa fa-layer-group"></i>
        <span data-i18n="scene-controller.label.playMode"></span>
    </label>
    <select id="node-input-playMode" style="width:70%;">
        <option value="switch" selected data-i18n="scene-controller.label.playMode_switch"></option>
        <option value="add" data-i18n="scene-controller.label.playMode_add"></option>
    </select>
</div>
<div class="form-row">
    <label for="node-input-blackoutOnStop" style="width:auto;">
        <i class="fa fa-power-off"></i>
        <span data-i18n="scene-controller.label.blackoutOnStop"></span>
    </label>
    <input type="checkbox" id="node-input-blackoutOnStop" style="display:inline-block; width:auto; vertical-align:top;">
</div>
