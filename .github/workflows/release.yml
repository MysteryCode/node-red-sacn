name: Release

on:
  push:
    tags: [ '*' ]
  workflow_dispatch:

jobs:
  build:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org/"
      # trusted publishing (OIDC) requires npm >= 11.5.1; Node 24 ships an older npm
      - run: npm install -g npm@latest
      - run: npm ci
      - name: Type-check
        run: npx tsc --noEmit
      - name: Lint
        run: npx eslint .
      - name: Build
        run: npm run build
      - name: Read package.json
        id: package
        # pinned to a commit to avoid pulling an unreviewed moving ref
        uses: RadovanPelka/github-action-json@c1e93581d313d6e1d56f7f67582d4051674ebc57 # main
        with:
          path: "package.json"
      - name: Remove old builds
        run: |
          rm -rf *.tgz
      - name: Publish to npmjs.com
        if: steps.package.outputs.private == '' || steps.package.outputs.private == 'false' || steps.package.outputs.private == false
        # trusted publisher (OIDC): no NPM_TOKEN needed, provenance is generated automatically
        run: npm publish --access public
      - name: Create package
        run: |
          npm pack
      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.tgz"
          fail_on_unmatched_files: true
