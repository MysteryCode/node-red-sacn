<script type="text/html" data-template-name="sacn-in">
    <div class="form-row">
        <label for="node-input-name">
            <i class="fa fa-tag"></i>
            <span data-i18n="node-red:common.label.name"></span>
        </label>
        <input type="text" id="node-input-name" data-i18n="[placeholder]node-red:common.label.name" style="width:70%;"/>
    </div>
    <div class="form-row">
        <label for="node-input-universe">
            <i class="fa fa-hashtag"></i>
            <span data-i18n="sacn-in.label.universe"></span>
        </label>
        <input type="number" id="node-input-universe" min="1" max="63999" step="1" style="width:70%;"/>
    </div>
    <div class="form-row">
        <label for="node-input-mode">
            <i class="fa fa-compress"></i>
            <span data-i18n="sacn-in.label.mode"></span>
        </label>
        <select id="node-input-mode" style="width:70%;">
            <option value="passthrough" data-i18n="sacn-in.label.mode_direct"></option>
            <option value="htp" selected data-i18n="sacn-in.label.mode_htp"></option>
            <option value="ltp" data-i18n="sacn-in.label.mode_ltp"></option>
        </select>
    </div>
    <div class="form-row">
        <label for="node-input-output">
            <i class="fa fa-compress"></i>
            <span data-i18n="sacn-in.label.output"></span>
        </label>
        <select id="node-input-output" style="width:70%;">
            <option value="full" selected data-i18n="sacn-in.label.output_full"></option>
            <option value="changes" data-i18n="sacn-in.label.output_changes"></option>
        </select>
    </div>
    <div class="form-row">
        <label for="node-input-values">
            <i class="fa fa-sliders"></i>
            <span data-i18n="sacn-in.label.values"></span>
        </label>
        <select id="node-input-values" style="width:70%;">
            <option value="percent" selected data-i18n="sacn-in.label.values_percent"></option>
            <option value="absolute" data-i18n="sacn-in.label.values_absolute"></option>
        </select>
    </div>
    <div class="form-row">
        <label for="node-input-trigger">
            <i class="fa fa-share-square-o"></i>
            <span data-i18n="sacn-in.label.trigger"></span>
        </label>
        <select id="node-input-trigger" style="width:70%;">
            <option value="changes" data-i18n="sacn-in.label.trigger_changes"></option>
            <option value="always" data-i18n="sacn-in.label.trigger_always"></option>
            <option value="interval" data-i18n="sacn-in.label.trigger_interval"></option>
        </select>
    </div>
    <div class="form-row" id="row-interval">
        <label for="node-input-interval">
            <i class="fa fa-clock-o"></i>
            <span data-i18n="sacn-in.label.interval"></span>
        </label>
        <input type="number" id="node-input-interval" min="1" step="1" style="width:70%;"/>
    </div>
    <div class="form-row">
        <label for="node-input-clearOnUniverseChange" style="width:auto;">
            <i class="fa fa-eraser"></i>
            <span data-i18n="sacn-in.label.clearOnUniverseChange"></span>
        </label>
        <input type="checkbox" id="node-input-clearOnUniverseChange" style="display:inline-block; width:auto; vertical-align:top; margin-left:4px;"/>
    </div>
    <div class="form-row">
        <label for="node-input-interface">
            <i class="fa fa-plug"></i>
            <span data-i18n="sacn-in.label.interface"></span>
        </label>
        <input type="text" id="node-input-interface" list="node-input-interface-options" style="width:70%;"/>
        <datalist id="node-input-interface-options"></datalist>
    </div>
    <div class="form-row">
        <label for="node-input-port">
            <span data-i18n="sacn-in.label.port"></span>
        </label>
        <input type="number" id="node-input-port" style="width:70%;"/>
    </div>
</script>
<script type="text/html" data-help-name="sacn-in">
    <p>Receives DMX data for a single universe via sACN (Streaming ACN / E1.31).</p>
    <h3>Details</h3>
    <p>
        The node listens on the network for sACN packets addressed to the configured
        <b>universe</b> and emits the DMX values on its output. Depending on the selected
        <b>mode</b> it either forwards every received packet unmodified (<i>passthrough</i>)
        or merges the data of all senders using <i>HTP</i> (Highest Takes Precedence) or
        <i>LTP</i> (Latest Takes Precedence).
    </p>
    <p>
        DMX values in the <code>payload</code> are keyed by DMX channel, starting at key <code>1</code>
        (not <code>0</code>). Depending on the <b>Values</b> setting they are expressed as a
        <b>percentage</b> (<code>0</code>–<code>100</code>) or as raw <b>DMX values</b> (<code>0</code>–<code>255</code>).
    </p>
    <h4>Configuration</h4>
    <dl class="message-properties">
        <dt>Universe <span class="property-type">number</span></dt>
        <dd>The universe to observe, <code>1</code> to <code>63999</code>. Default <code>1</code>.</dd>
        <dt>Mode <span class="property-type">passthrough | htp | ltp</span></dt>
        <dd>Whether to emit every received packet or merged values using HTP or LTP.</dd>
        <dt>Output <span class="property-type">full | changes</span></dt>
        <dd>Emit the whole universe on every update (<i>full</i>) or only the changed channels (<i>changes</i>).</dd>
        <dt>Values <span class="property-type">percent | absolute</span></dt>
        <dd>Emit channel values as a percentage (<code>0</code>–<code>100</code>) or as raw DMX values (<code>0</code>–<code>255</code>). Default <code>percent</code>.</dd>
        <dt>Output trigger <span class="property-type">changes | always | interval</span></dt>
        <dd>
            Controls <b>when</b> a message is emitted, independently of the mode:
            <ul>
                <li><i>changes only</i> — emit only when the values change.</li>
                <li><i>every packet</i> — emit on every received sACN packet, even without a change.</li>
                <li>
                    <i>changes + cyclic</i> — emit on change and reset a keepalive timer; if no change arrives
                    within the interval, the current full universe is re-emitted.
                </li>
            </ul>
            In the merging modes, <i>every packet</i> and the cyclic re-emit send the full merged universe.
        </dd>
        <dt class="optional">Interval <span class="property-type">number</span></dt>
        <dd>Keepalive interval in milliseconds for the <i>changes + cyclic</i> trigger. Default <code>1000</code>.</dd>
        <dt class="optional">Blank on universe change <span class="property-type">boolean</span></dt>
        <dd>
            When switching the universe via <code>msg.universe</code>, immediately emit a full universe of
            zeros for the new universe until the first real data arrives. Default <code>false</code>.
        </dd>
        <dt class="optional">Interface <span class="property-type">string</span></dt>
        <dd>IP address of the network interface used for receiving. Leave empty to listen on all interfaces.</dd>
        <dt class="optional">Port <span class="property-type">number</span></dt>
        <dd>Network port to listen on. Defaults to <code>5568</code>.</dd>
    </dl>
    <h3>Inputs</h3>
    <dl class="message-properties">
        <dt>universe <span class="property-type">number</span></dt>
        <dd>
            Switches the observed universe at runtime, <code>1</code> to <code>63999</code>. The node stops
            listening on the previous universe and starts listening on the new one. Invalid values are
            ignored and produce a warning.
        </dd>
    </dl>
    <h3>Outputs</h3>
    <p>The properties emitted depend on the selected mode.</p>
    <h4>Passthrough mode</h4>
    <dl class="message-properties">
        <dt>universe <span class="property-type">number</span></dt>
        <dd>ID of the universe the packet is addressed to.</dd>
        <dt>payload <span class="property-type">object</span></dt>
        <dd>DMX values as percentage, keyed by channel (<code>1</code>-based).</dd>
        <dt>sequence <span class="property-type">number</span></dt>
        <dd>Packet sequence number of the sender, <code>1</code> to <code>255</code>.</dd>
        <dt>source <span class="property-type">string</span></dt>
        <dd>IP address of the sender.</dd>
        <dt>priority <span class="property-type">number</span></dt>
        <dd>Priority of the sender, <code>1</code> to <code>200</code>.</dd>
    </dl>
    <h4>Merging modes (HTP / LTP)</h4>
    <dl class="message-properties">
        <dt>universe <span class="property-type">number</span></dt>
        <dd>ID of the universe the data is addressed to.</dd>
        <dt>payload <span class="property-type">object</span></dt>
        <dd>Merged DMX values as percentage, keyed by channel (<code>1</code>-based).</dd>
    </dl>
    <h3>References</h3>
    <ul>
        <li><a href="https://www.npmjs.com/package/sacn">sacn</a> - the underlying library</li>
        <li><a href="https://github.com/MysteryCode/node-red-sacn">GitHub</a> - the node's repository</li>
    </ul>
</script>
<script type="text/javascript">
    (function () {
        function populateInterfaceOptions() {
            const list = document.getElementById("node-input-interface-options");
            if (!list) {
                return;
            }
            $.getJSON("sacn/interfaces", (interfaces) => {
                list.replaceChildren();
                interfaces.forEach((iface) => {
                    const option = document.createElement("option");
                    option.value = iface.address;
                    option.label = `${iface.name} (${iface.address})`;
                    list.appendChild(option);
                });
            });
        }
        function toInt(value) {
            if (typeof value === "number") {
                return value;
            }
            if (typeof value === "string") {
                return parseInt(value, 10);
            }
            return NaN;
        }
        function isValidInterface(value) {
            if (typeof value !== "string" || value === "") {
                return true;
            }
            return /^(\d{1,3}\.){3}\d{1,3}$/.test(value);
        }
        function isValidUniverse(value) {
            const n = toInt(value);
            return !isNaN(n) && n >= 1 && n <= 63999;
        }
        function isValidPort(value) {
            if (value === undefined || value === null || value === "") {
                return true;
            }
            const n = toInt(value);
            return !isNaN(n) && n >= 1 && n <= 65535;
        }
        const def = {
            category: "sACN",
            color: "#dcc515",
            defaults: {
                name: {
                    value: "",
                },
                universe: {
                    value: 1,
                    required: true,
                    validate: function (v) {
                        return isValidUniverse(v);
                    },
                },
                port: {
                    value: undefined,
                    required: false,
                    validate: function (v) {
                        return isValidPort(v);
                    },
                },
                interface: {
                    value: "",
                    required: false,
                    validate: function (v) {
                        return isValidInterface(v);
                    },
                },
                mode: {
                    value: "htp",
                    required: true,
                },
                output: {
                    value: "full",
                    required: true,
                },
                trigger: {
                    value: "changes",
                    required: true,
                },
                interval: {
                    value: 1000,
                    required: true,
                },
                clearOnUniverseChange: {
                    value: false,
                },
                values: {
                    value: "percent",
                    required: true,
                },
            },
            inputs: 1,
            outputs: 1,
            paletteLabel: "sACN in",
            icon: "sacn-in.svg",
            label: function () {
                return this.name || `sACN in · U${this.universe}`;
            },
            labelStyle: function () {
                return this.name ? "node_label_italic" : "";
            },
            oneditprepare: function () {
                const select = document.getElementById("node-input-trigger");
                const row = document.getElementById("row-interval");
                const toggleInterval = () => {
                    if (row) {
                        row.style.display = select?.value === "interval" ? "" : "none";
                    }
                };
                select?.addEventListener("change", toggleInterval);
                toggleInterval();
                populateInterfaceOptions();
            },
        };
        RED.nodes.registerType("sacn-in", def);
    })();
</script>
