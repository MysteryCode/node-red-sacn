<script type="text/html" data-template-name="sacn-out">
    <div class="form-row">
        <label for="node-input-name">
            <i class="fa fa-tag"></i>
            <span data-i18n="node-red:common.label.name"></span>
        </label>
        <input type="text" id="node-input-name" data-i18n="[placeholder]node-red:common.label.name" style="width:70%;"/>
    </div>
    <div class="form-row">
        <label for="node-input-universe">
            <i class="fa fa-hashtag"></i>
            <span data-i18n="sacn-out.label.universe"></span>
        </label>
        <input type="number" id="node-input-universe" min="1" max="63999" step="1" style="width:70%;"/>
    </div>
    <div class="form-row">
        <label for="node-input-sourceName">
            <i class="fa fa-hashtag"></i>
            <span data-i18n="sacn-out.label.sourceName"></span>
        </label>
        <input type="text" id="node-input-sourceName" maxlength="50" style="width:70%;"/>
    </div>
    <div class="form-row">
        <label for="node-input-speed">
            <i class="fa fa-tachometer"></i>
            <span data-i18n="sacn-out.label.speed"></span>
        </label>
        <select id="node-input-speed" style="width:70%;">
            <option value="0" selected data-i18n="sacn-out.label.speed_once"></option>
            <option value="24" data-i18n="sacn-out.label.speed_24"></option>
            <option value="27" data-i18n="sacn-out.label.speed_27"></option>
            <option value="30" data-i18n="sacn-out.label.speed_30"></option>
            <option value="40" data-i18n="sacn-out.label.speed_40"></option>
            <option value="44" data-i18n="sacn-out.label.speed_44"></option>
        </select>
    </div>
    <div class="form-row">
        <label for="node-input-priority">
            <i class="fa fa-sort-numeric-asc "></i>
            <span data-i18n="sacn-out.label.priority"></span>
        </label>
        <input type="number" id="node-input-priority" min="1" max="200" step="1" style="width:70%;"/>
    </div>
    <div class="form-row">
        <label for="node-input-values">
            <i class="fa fa-sliders"></i>
            <span data-i18n="sacn-out.label.values"></span>
        </label>
        <select id="node-input-values" style="width:70%;">
            <option value="percent" selected data-i18n="sacn-out.label.values_percent"></option>
            <option value="absolute" data-i18n="sacn-out.label.values_absolute"></option>
        </select>
    </div>
    <div class="form-row">
        <label for="node-input-blankOnClose" style="width:auto;">
            <i class="fa fa-eraser"></i>
            <span data-i18n="sacn-out.label.blankOnClose"></span>
        </label>
        <input type="checkbox" id="node-input-blankOnClose" style="display:inline-block; width:auto; vertical-align:top; margin-left:4px;"/>
    </div>
    <div class="form-row">
        <label for="node-input-interface">
            <i class="fa fa-plug"></i>
            <span data-i18n="sacn-out.label.interface"></span>
        </label>
        <input type="text" id="node-input-interface" list="node-input-interface-options" style="width:70%;"/>
        <datalist id="node-input-interface-options"></datalist>
    </div>
    <div class="form-row">
        <label for="node-input-port">
            <span data-i18n="sacn-out.label.port"></span>
        </label>
        <input type="number" id="node-input-port" style="width:70%;"/>
    </div>
</script>
<script type="text/html" data-help-name="sacn-out">
    <p>Sends DMX data for a single universe via sACN (Streaming ACN / E1.31).</p>
    <h3>Details</h3>
    <p>
        Each incoming message provides the DMX values for the configured <b>universe</b>, which the
        node transmits as an sACN sender. Depending on the <b>speed</b> setting the data is sent
        once per message or repeated continuously at the selected refresh rate.
    </p>
    <p>
        DMX values in the <code>payload</code> are keyed by DMX channel, starting at key <code>1</code>
        (not <code>0</code>). Depending on the <b>Values</b> setting they are expected as a
        <b>percentage</b> (<code>0</code>–<code>100</code>) or as raw <b>DMX values</b> (<code>0</code>–<code>255</code>).
    </p>
    <h4>Configuration</h4>
    <dl class="message-properties">
        <dt>Universe <span class="property-type">number</span></dt>
        <dd>The universe to send to, <code>1</code> to <code>63999</code>. Default <code>1</code>.</dd>
        <dt>Source name <span class="property-type">string</span></dt>
        <dd>Name of the sACN sender shown on the network (below 50 characters). Default <code>Node-RED</code>.</dd>
        <dt>Speed <span class="property-type">number</span></dt>
        <dd>Refresh rate in Hz: <code>0</code> (once), <code>24</code>, <code>27</code>, <code>30</code>, <code>40</code> or <code>44</code>. Default <code>0</code>.</dd>
        <dt>Priority <span class="property-type">number</span></dt>
        <dd>Priority of the sender, <code>1</code> to <code>200</code>. Default <code>100</code>.</dd>
        <dt>Values <span class="property-type">percent | absolute</span></dt>
        <dd>Interpret the incoming payload as a percentage (<code>0</code>–<code>100</code>) or as raw DMX values (<code>0</code>–<code>255</code>). Default <code>percent</code>.</dd>
        <dt class="optional">Blank output on stop <span class="property-type">boolean</span></dt>
        <dd>Send an all-zero frame before closing so receivers go dark on stop/redeploy instead of holding the last look. Default <code>false</code>.</dd>
        <dt class="optional">Interface <span class="property-type">string</span></dt>
        <dd>IP address of the network interface used for sending. Leave empty to use the default interface.</dd>
        <dt class="optional">Port <span class="property-type">number</span></dt>
        <dd>Network port to send on. Defaults to <code>5568</code>.</dd>
    </dl>
    <h3>Inputs</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">array | object</span></dt>
        <dd>DMX values as percentage, keyed by channel (<code>1</code>-based).</dd>
    </dl>
    <h3>References</h3>
    <ul>
        <li><a href="https://www.npmjs.com/package/sacn">sacn</a> - the underlying library</li>
        <li><a href="https://github.com/MysteryCode/node-red-sacn">GitHub</a> - the node's repository</li>
    </ul>
</script>
<script type="text/javascript">
    (function () {
        function populateInterfaceOptions() {
            const list = document.getElementById("node-input-interface-options");
            if (!list) {
                return;
            }
            $.getJSON("sacn/interfaces", (interfaces) => {
                list.replaceChildren();
                interfaces.forEach((iface) => {
                    const option = document.createElement("option");
                    option.value = iface.address;
                    option.label = `${iface.name} (${iface.address})`;
                    list.appendChild(option);
                });
            });
        }
        function toInt(value) {
            if (typeof value === "number") {
                return value;
            }
            if (typeof value === "string") {
                return parseInt(value, 10);
            }
            return NaN;
        }
        function isValidInterface(value) {
            if (typeof value !== "string" || value === "") {
                return true;
            }
            return /^(\d{1,3}\.){3}\d{1,3}$/.test(value);
        }
        function isValidUniverse(value) {
            const n = toInt(value);
            return !isNaN(n) && n >= 1 && n <= 63999;
        }
        function isValidPort(value) {
            if (value === undefined || value === null || value === "") {
                return true;
            }
            const n = toInt(value);
            return !isNaN(n) && n >= 1 && n <= 65535;
        }
        const def = {
            category: "sACN",
            color: "#dcc515",
            defaults: {
                name: {
                    value: "",
                },
                universe: {
                    value: 1,
                    required: true,
                    validate: function (v) {
                        return isValidUniverse(v);
                    },
                },
                port: {
                    value: undefined,
                    required: false,
                    validate: function (v) {
                        return isValidPort(v);
                    },
                },
                interface: {
                    value: "",
                    required: false,
                    validate: function (v) {
                        return isValidInterface(v);
                    },
                },
                speed: {
                    value: 0,
                    required: true,
                },
                priority: {
                    value: 100,
                    required: true,
                },
                sourceName: {
                    value: "Node-RED",
                    required: true,
                },
                blankOnClose: {
                    value: false,
                },
                values: {
                    value: "percent",
                    required: true,
                },
            },
            inputs: 1,
            outputs: 0,
            paletteLabel: "sACN out",
            icon: "sacn-out.svg",
            label: function () {
                return this.name || `sACN out · U${this.universe}`;
            },
            labelStyle: function () {
                return this.name ? "node_label_italic" : "";
            },
            oneditprepare: function () {
                populateInterfaceOptions();
            },
        };
        RED.nodes.registerType("sacn-out", def);
    })();
</script>
